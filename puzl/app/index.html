<script>
(function() {
  var ua = navigator.userAgent || navigator.vendor || window.opera;

  var ios = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var android = /android/i.test(ua);

  if (ios) {
    window.location.replace("https://apps.apple.com/us/app/puzl-turn-photos-to-puzzles/id6758163921");
  }
  else if (android) {
    window.location.replace("https://play.google.com/store/apps/details?id=io.bellstudios.puzl");
  }
  else {
    window.location.replace("https://bellstudios.io/puzl/");
  }
})();
</script>
